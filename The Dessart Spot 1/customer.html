<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Details</title>

<style>
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#2b0f0f,#4b1c1c);
  font-family:Poppins,sans-serif;
}
.card{
  background:#fff;
  padding:35px;
  width:100%;
  max-width:420px;
  border-radius:25px;
  animation:pop 0.8s ease;
}
h2{text-align:center;margin-bottom:20px;color:#2b0f0f}
input,button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:10px;
  border:1px solid #ccc;
}
button{
  background:#ffb703;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
@keyframes pop{
  from{opacity:0;transform:scale(.9) translateY(20px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
</style>
</head>

<body>

<div class="card">
  <h2>👤 Customer Details</h2>

  <!-- REQUIRED INPUTS -->
  <input type="text" id="name" placeholder="Customer Name" required>
  <input type="tel" id="phone" placeholder="Phone Number" required>

  <!-- CONTINUE BUTTON -->
  <button onclick="continueOrder()">Continue</button>
</div>

<script>
function continueOrder(){
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();

  if(!name || !phone){
    alert("Please enter name and phone number");
    return;
  }

  // ✅ SAVE DETAILS (THIS IS CRITICAL)
  localStorage.setItem("customerName", name);
  localStorage.setItem("customerPhone", phone);

  // ✅ GO TO ORDER PAGE
  window.location.href = "order.html";
}
</script>

</body>
</html>
