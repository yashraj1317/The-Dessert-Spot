<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>The Dessert Spot – Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    /* BODY CENTER */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2b0f0f, #4b1c1c);
      color: #fff;
    }

    /* PAGE CONTAINER */
    .page {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 50px;
      animation: popIn 0.9s ease forwards;
    }

    /* HERO SECTION */
    .hero {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hero h1 {
      font-size: 3rem;
      animation: slideDown 1s ease;
    }

    .hero p {
      opacity: 0.9;
      font-size: 1.1rem;
    }

    /* BUTTON */
    .order-cta {
      background: #ffb703;
      color: #2b0f0f;
      padding: 14px 36px;
      border-radius: 30px;
      font-weight: bold;
      text-decoration: none;
      animation: pulse 2s infinite;
      transition: transform .3s ease, box-shadow .3s ease;
    }

    .order-cta:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 30px rgba(0, 0, 0, .5);
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 183, 3, .7)
      }

      70% {
        box-shadow: 0 0 0 18px rgba(255, 183, 3, 0)
      }

      100% {
        box-shadow: 0 0 0 0 rgba(255, 183, 3, 0)
      }
    }


    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    /* GALLERY */
    .gallery {
      width: 100%;
      background: #fff;
      color: #2b0f0f;
      padding: 50px 20px;
      border-radius: 30px;
      text-align: center;
    }

    .gallery h2 {
      font-size: 2rem;
      margin-bottom: 35px;
    }

    /* IMAGE GRID */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
    }

    .image-grid img {
      width: 100%;
      border-radius: 22px;
      opacity: 0;
      animation: popImage 0.8s ease forwards, float 4s ease-in-out infinite;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      transition: transform 0.4s ease;
    }

    .image-grid img:hover {
      transform: scale(1.08);
    }

    /* IMAGE DELAYS */
    .image-grid img:nth-child(1) {
      animation-delay: 0.3s
    }

    .image-grid img:nth-child(2) {
      animation-delay: 0.7s
    }

    .image-grid img:nth-child(3) {
      animation-delay: 1.1s
    }

    /* ANIMATIONS */
    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.85)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    @keyframes slideDown {
      from {
        transform: translateY(-40px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    @keyframes popImage {
      from {
        transform: scale(0.8);
        opacity: 0
      }

      to {
        transform: scale(1);
        opacity: 1
      }
    }

    @keyframes float {
      0% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-12px)
      }

      100% {
        transform: translateY(0)
      }
    }

    /* MOBILE */
    @media(max-width:600px) {
      .hero h1 {
        font-size: 2.2rem;
      }

      .gallery h2 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

<body>

  <div class="page">

    <!-- HERO -->
    <header class="hero">
      <h1>🍫 The Dessert Spot</h1>
      <p>Fresh • Delicious • Made with Love</p>
      <a href="customer.html" class="order-cta">Order Now</a>
      </a>

      <script>
        function goToCustomer() {
          window.location.href = "customer.html";
        }
      </script>

    </header>

    <!-- GALLERY -->
    <section class="gallery">
      <h2>Our Signature Dessert Bowls</h2>
      <div class="image-grid">
        <img src="Gemini_Generated_Image_ksa1bgksa1bgksa1.png" alt="Dessert Bowl 1">
        <img src="Gemini_Generated_Image_hokxabhokxabhokx.png" alt="Dessert Bowl 2">
        <img src="Gemini_Generated_Image_9xeq4y9xeq4y9xeq.png" alt="Dessert Bowl 3">
      </div>
    </section>

  </div>

</body>

</html>
